services:
  redis:
    image: redis:7-alpine

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  plywatch:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "plywatch.main:app",
        "--app-dir",
        "/app/apps/backend/src",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
        "--reload-dir",
        "/app/apps/backend/src",
        "--log-level",
        "info"
      ]
    environment:
      PLYWATCH_CELERY_BROKER_URL: redis://redis:6379/0
      PLYWATCH_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PLYWATCH_CACHE_BACKEND: memory
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend:/app/apps/backend
      - shared_lab:/workspace/shared

  plywatch-rabbitmq:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "plywatch.main:app",
        "--app-dir",
        "/app/apps/backend/src",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
        "--reload-dir",
        "/app/apps/backend/src",
        "--log-level",
        "info"
      ]
    environment:
      PLYWATCH_CELERY_BROKER_URL: pyamqp://guest:guest@rabbitmq:5672//
      PLYWATCH_CELERY_RESULT_BACKEND: rpc://
      PLYWATCH_CACHE_BACKEND: memory
      PYTHONUNBUFFERED: "1"
    depends_on:
      - rabbitmq
    ports:
      - "8081:8080"
    volumes:
      - ./apps/backend:/app/apps/backend
      - shared_lab:/workspace/shared

  producer-api:
    build:
      context: ./examples/lab/app-producer
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--app-dir",
        "/app/src",
        "--host",
        "0.0.0.0",
        "--port",
        "8090",
        "--reload",
        "--reload-dir",
        "/app/src",
        "--log-level",
        "error"
      ]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
    ports:
      - "8090:8090"
    volumes:
      - ./examples/lab/app-producer/src:/app/src
      - ./examples/lab/app-producer/config:/app/config
      - shared_lab:/workspace/shared

  producer-api-rabbitmq:
    build:
      context: ./examples/lab/app-producer
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--app-dir",
        "/app/src",
        "--host",
        "0.0.0.0",
        "--port",
        "8090",
        "--reload",
        "--reload-dir",
        "/app/src",
        "--log-level",
        "error"
      ]
    environment:
      CELERY_BROKER_URL: pyamqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      PYTHONUNBUFFERED: "1"
    depends_on:
      - rabbitmq
    ports:
      - "8091:8090"
    volumes:
      - ./examples/lab/app-producer/src:/app/src
      - ./examples/lab/app-producer/config:/app/config
      - shared_lab:/workspace/shared

  producer-worker:
    build:
      context: ./examples/lab/app-producer
    command:
      [
        "celery",
        "-A",
        "app.worker_main:celery_app",
        "worker",
        "--loglevel=ERROR",
        "--hostname=default@%h",
        "-Q",
        "default"
      ]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
    volumes:
      - ./examples/lab/app-producer/src:/app/src
      - ./examples/lab/app-producer/config:/app/config

  producer-worker-rabbitmq:
    build:
      context: ./examples/lab/app-producer
    command:
      [
        "celery",
        "-A",
        "app.worker_main:celery_app",
        "worker",
        "--loglevel=ERROR",
        "--hostname=rabbit-default@%h",
        "-Q",
        "default"
      ]
    environment:
      CELERY_BROKER_URL: pyamqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      PYTHONUNBUFFERED: "1"
    depends_on:
      - rabbitmq
    volumes:
      - ./examples/lab/app-producer/src:/app/src
      - ./examples/lab/app-producer/config:/app/config

  producer-worker-slow:
    build:
      context: ./examples/lab/app-producer
    command:
      [
        "celery",
        "-A",
        "app.worker_main:celery_app",
        "worker",
        "--loglevel=ERROR",
        "--hostname=slow@%h",
        "-Q",
        "slow"
      ]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
    volumes:
      - ./examples/lab/app-producer/src:/app/src
      - ./examples/lab/app-producer/config:/app/config

  producer-worker-slow-rabbitmq:
    build:
      context: ./examples/lab/app-producer
    command:
      [
        "celery",
        "-A",
        "app.worker_main:celery_app",
        "worker",
        "--loglevel=ERROR",
        "--hostname=rabbit-slow@%h",
        "-Q",
        "slow"
      ]
    environment:
      CELERY_BROKER_URL: pyamqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      PYTHONUNBUFFERED: "1"
    depends_on:
      - rabbitmq
    volumes:
      - ./examples/lab/app-producer/src:/app/src
      - ./examples/lab/app-producer/config:/app/config

  web:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "npm install && npm run dev"]
    depends_on:
      - plywatch
    ports:
      - "4173:4173"
    volumes:
      - ./apps/web:/app

volumes:
  shared_lab:
