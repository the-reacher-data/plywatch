sonar.projectName=plywatch
sonar.sources=apps/backend/src,apps/web/src
sonar.tests=apps/backend/tests,apps/web/src
sonar.test.inclusions=apps/web/src/**/*.test.ts,apps/web/src/**/*.spec.ts
sonar.exclusions=apps/web/build/**,apps/web/.svelte-kit/**,apps/web/node_modules/**,**/__pycache__/**,**/*.pyc
sonar.python.coverage.reportPaths=coverage.xml
